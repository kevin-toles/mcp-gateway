  # ── Context Management Service — CMS :8086 ────────────────────────────────────
  # Bifurcated processing pipeline: TextSegment / CodeBlock routing,
  # token optimization, skeleton client → struct-analyzer skeletonize.
  # Synergy workflow: W-13

  - name: cms_warmup
    description: "Pre-warm the Context Management Service and verify struct-analyzer skeletonize connectivity. Returns readiness status. Requires context-management-service (:8086)."
    when_to_use: "Run at session start when CMS is cold. Confirms :8086 → :8088 skeletonize link before any cms_process call."
    tier: silver
    tags: [cms, warmup, health]

  - name: cms_validate
    description: "Validate a context payload against CMS schema before committing to processing. Returns validation errors and warnings. Requires context-management-service (:8086)."
    when_to_use: "Pre-flight check before cms_chunk or cms_process. Catch schema issues early without spending tokens on a failed pipeline run. Part of W-13 (step 0)."
    tier: bronze
    tags: [cms, validate, schema]

  - name: cms_chunk
    description: "Bifurcate input into typed segments: TextSegment (prose, markdown) and CodeBlock (fenced code blocks with language detection, inline code spans). Returns a structured segment list. Requires context-management-service (:8086)."
    when_to_use: "When downstream tools need to process text and code separately. First processing step after cms_validate. Part of W-13 (step 1)."
    tier: silver
    tags: [cms, chunk, bifurcation, segmentation]

  - name: cms_optimize
    description: "Optimize a context window using token budget analysis and segment routing. Text segments routed through TokenOptimizer; code segments routed through SkeletonClient → struct-analyzer /v1/analyze/skeletonize. Returns compressed, semantically equivalent context. Requires context-management-service (:8086) and struct-analyzer (:8088)."
    when_to_use: "Reduce token usage while preserving semantic meaning. Critical before long-context LLM calls. Part of W-13 (step 2)."
    tier: gold
    tags: [cms, optimize, tokens, skeleton]

  - name: cms_process
    description: "Full bifurcated processing pipeline in one call: validate → chunk → optimize → glossary injection. Orchestrates the complete CMS flow. Returns optimized context ready for LLM consumption. Requires context-management-service (:8086) and struct-analyzer (:8088)."
    when_to_use: "End-to-end context preparation in one call. Use when full pipeline is needed without step-by-step control. Equivalent to cms_validate → cms_chunk → cms_optimize → cms_get_glossary in sequence. Part of W-13 (shortcut)."
    tier: gold
    tags: [cms, process, pipeline, orchestration]

  - name: cms_get_metrics
    description: "Retrieve context window metrics and token utilization statistics for the current or a past processing run. Returns per-segment token counts, optimization ratios, and skeleton compression stats. Requires context-management-service (:8086)."
    when_to_use: "Monitor token efficiency after cms_process or cms_optimize. Identify high-cost segments for targeted optimization."
    tier: bronze
    tags: [cms, metrics, tokens, observability]

  - name: cms_glossary_define
    description: "Add a term-definition pair to the active conversation's glossary context. Terms accumulate across calls within the same conversation_id. Requires context-management-service (:8086)."
    when_to_use: "Build up domain vocabulary for the current conversation to reduce repetitive token re-explanation. Part of W-13 (step 3, optional)."
    tier: silver
    tags: [cms, glossary, vocabulary, context]

  - name: cms_get_glossary
    description: "Retrieve the accumulated glossary for a conversation_id. Returns all defined terms with definitions in order of insertion. Requires context-management-service (:8086)."
    when_to_use: "Audit established vocabulary before injecting context into a new LLM call. Part of W-13 (step 4)."
    tier: bronze
    tags: [cms, glossary, retrieval, context]

  # ── Inference (inference-service-cpp :8085) ───────────────────────────────────
  - name: inference
    description: "Run inference against locally hosted models via the C++ inference service (llama.cpp). Endpoint /v1/models. Supports 3-model demo configuration with Qwen3.5 9B Q4_K_M primary. Fully offline-capable. Requires inference-service-cpp (:8085)."
    when_to_use: "On-device LLM inference without cloud dependency. Demo-safe (works fully offline). Low-latency for structured completion tasks. Feeds llm_complete as the local tier."
    tier: gold
    tags: [inference, llm, local, metal, gpu]

  # ── unified-search-rs (Rust :8093) ────────────────────────────────────────────
  # Routes in tool_dispatcher.py keyed to UNIFIED_SEARCH_RS_URL.
  # uss_graph_query / uss_graph_traverse remain pending — no graph API in uss-server yet.

  - name: uss_ring_search
    description: "6-ring concentric search pipeline on unified-search-rs (:8093): Ring 0 (ANN primary hit) → Rings 1–5 (KF envelope, sibling, domain bridge, cross-collection, suggestion expansion) → RRF fusion → cascade enrichment → MMR re-rank → budget trim. Returns RingSearchResponse with per-ring provenance chains and cascade metadata. Higher recall than flat hybrid search."
    when_to_use: "Use when knowledge_search returns insufficient depth or diversity. Preferred high-recall KB retrieval path. Part of W-1, W-6."
    tier: gold
    tags: [search, rag, uss-rs, ring]

  - name: uss_scientific_search
    description: "Scientific and theoretical grounding search using unified-search-rs (:8093) /v1/search/scientific. Equivalent to foundation_search but on the Rust service."
    when_to_use: "Use for first-principles reasoning, formal proofs, or theoretical grounding. Prefer over foundation_search when on the Rust USS stack."
    tier: bronze
    tags: [search, foundation, scientific, uss-rs]

  - name: uss_embed
    description: "Embed text into a vector without a search round-trip via unified-search-rs (:8093) /v1/embed. Dimension depends on active embedding model (384-dim MiniLM default; 768-dim Nomic when use_nomic=true). Returns the raw embedding for downstream Qdrant queries."
    when_to_use: "Use when downstream code needs a raw embedding for a custom Qdrant query outside the search pipeline."
    tier: silver
    tags: [embed, vector, uss-rs]

  - name: uss_hydrate
    description: "Retrieve full chunk content by vector ID via unified-search-rs (:8093) /v1/hydrate. Expands truncated search result stubs into full payloads. Useful when ring search returns result IDs that need full content hydration."
    when_to_use: "Use after uss_ring_search when results return IDs with truncated content and full payloads are needed."
    tier: silver
    tags: [hydrate, retrieval, uss-rs]

  - name: uss_fitness_evaluate
    description: "Evaluate architecture fitness functions via unified-search-rs (:8093) /v1/fitness/evaluate. Same interface as sa_evaluate_fitness but does not require a local code checkout — evaluates against search results."
    when_to_use: "Use when sa_evaluate_fitness is unavailable or when fitness evaluation should run against search-derived artifacts rather than a local source tree."
    tier: gold
    tags: [fitness, architecture, uss-rs]

  - name: uss_fitness_batch
    description: "Batch evaluate multiple architecture fitness functions in a single request via unified-search-rs (:8093) /v1/fitness/batch. No struct-analyzer equivalent — unique to the Rust USS."
    when_to_use: "Use for CI/CD fitness gate checking multiple constraints in one call."
    tier: gold
    tags: [fitness, architecture, batch, uss-rs]

  - name: uss_graph_query
    description: "[PENDING: requires /v1/graph/query endpoint in uss-server] Read-only Cypher query against Neo4j knowledge graph. Same interface as graph_query. Will replace graph_query once the graph API is added to unified-search-rs."
    when_to_use: "PENDING. Use graph_query in the meantime. Same use case: topology lookups, concept links, service dependency queries."
    tier: gold
    tags: [graph, query, neo4j, uss-rs, pending]

  - name: uss_graph_traverse
    description: "[PENDING: requires /v1/graph/traverse endpoint in uss-server] BFS or MMR-diversity traversal from Neo4j start nodes. Same interface as graph_traverse. Will replace graph_traverse once the graph API is added to unified-search-rs."
    when_to_use: "PENDING. Use graph_traverse in the meantime. Same use case: neighborhood expansion, diversity-aware graph exploration."
    tier: silver
    tags: [graph, traversal, neo4j, uss-rs, pending]
